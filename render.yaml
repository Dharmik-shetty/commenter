services:
  - type: web
    name: commenter-dashboard
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: ENCRYPTION_KEY
        sync: false
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.8
