{% extends "base.html" %}
{% set page_id = "logs" %}

{% block title %}Logs — AI Comment Bot{% endblock %}
{% block page_title %}<i class="bi bi-journal-text" style="color:var(--accent);margin-right:8px"></i>Activity Logs{% endblock %}

{% block content %}
<!-- ═══ FILTER BAR ═══ -->
<div class="control-bar">
    <div class="flex items-center gap-12">
        <select class="form-control" id="filter-platform" onchange="filterLogs()" style="width:150px">
            <option value="">All Platforms</option>
            <option value="reddit">Reddit</option>
            <option value="instagram">Instagram</option>
            <option value="youtube">YouTube</option>
        </select>
        <select class="form-control" id="filter-status" onchange="filterLogs()" style="width:130px">
            <option value="">All Status</option>
            <option value="success">Success</option>
            <option value="failed">Failed</option>
            <option value="pending">Pending</option>
        </select>
        <span style="font-size:12px;color:var(--text-muted);" id="logs-total"></span>
    </div>
    <div class="flex gap-8">
        <button class="btn btn-outline" onclick="loadLogs()">
            <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
        <button class="btn btn-danger" onclick="clearAllLogs()">
            <i class="bi bi-trash"></i> Clear All
        </button>
    </div>
</div>

<!-- ═══ LOGS TABLE ═══ -->
<div class="card">
    <div class="card-body" style="padding:0;">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Platform</th>
                        <th>Account</th>
                        <th>Post / Keyword</th>
                        <th>Comment</th>
                        <th>Status</th>
                        <th>Match %</th>
                    </tr>
                </thead>
                <tbody id="logs-tbody">
                    <tr><td colspan="7" class="empty-state"><p>Loading logs...</p></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
